<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E3A8A"/>
            <stop offset="100%" stop-color="#3B82F6"/>
        </linearGradient>
        <filter id="dot-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>
    <g transform="translate(10, 10)">
        <!-- 圆角背景 -->
        <rect width="80" height="80" rx="16" fill="url(#bg-gradient)"></rect>
        <!-- S 字母折线 -->
        <path d="M 55 25 H 30 A 5 5 0 0 0 25 30 V 35 A 5 5 0 0 0 30 40 H 50 A 5 5 0 0 1 55 45 V 50 A 5 5 0 0 1 50 55 H 25" 
              fill="none" 
              stroke="#ffffff" 
              stroke-width="9" 
              stroke-linecap="round" 
              stroke-linejoin="round">
        </path>
        <!-- 发光圆点 -->
        <circle cx="55" cy="25" r="6.5" fill="#FFFFFF" stroke="#06B6D4" stroke-width="3" filter="url(#dot-glow)"></circle>
    </g>
</svg>