        <!-- SVG Logo Start -->
        <svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- 深蓝科技渐变 (外框方正基石) -->
                <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#1E3A8A"></stop>
                    <stop offset="100%" stop-color="#3B82F6"></stop>
                </linearGradient>
                
                <!-- 亮青AI渐变 (内部S数据流) -->
                <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#06B6D4"></stop>
                    <stop offset="100%" stop-color="#38BDF8"></stop>
                </linearGradient>

                <!-- AI节点发光效果 -->
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                </filter>
            </defs>

            <!-- ================= 图形部分 (Icon) ================= -->
            <g transform="translate(10, 20)">
                <!-- 外部方正基石 (Square) -->
                <rect x="0" y="0" width="80" height="80" rx="16" stroke="none" fill="url(#gradBlue)"></rect>
                
                <!-- 内部S形圆角折线 (Thick Rounded Circuit S) -->
                <path d="M 55 25 
                         H 30 
                         A 5 5 0 0 0 25 30 
                         V 35 
                         A 5 5 0 0 0 30 40 
                         H 50 
                         A 5 5 0 0 1 55 45 
                         V 50 
                         A 5 5 0 0 1 50 55 
                         H 25" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"></path>
                
                <!-- 激活的AI数据节点 (Glowing AI Node) -->
                <circle cx="55" cy="25" r="6.5" fill="#FFFFFF" stroke="#06B6D4" stroke-width="3" filter="url(#glow)"></circle>
            </g>

            <!-- ================= 文字部分 (Typography) ================= -->
            <!-- 英文名称: Si + Square -->
            <!-- Y轴微调至62，与中文形成更好的上下比例 -->
            <text x="115" y="62" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="#0F172A">
                Si<tspan fill="#1D4ED8">Square</tspan>
            </text>
            
            <!-- 中文名称: 賽方科技 -->
            <!-- X轴统一为115严格左对齐，Y轴微调至94，颜色微调加深提升质感 -->
            <text x="115" y="94" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#475569" letter-spacing="13">
                賽方科技
            </text>
            
            <!-- AI 小角标 -->
            <!-- 位置下移并左移，紧贴在 Square 的右上角，形成浑然一体的视觉组 -->
            <g transform="translate(325, 28)">
                <rect x="0" y="0" width="30" height="18" rx="5" fill="#06B6D4"></rect>
                <text x="15" y="13" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">AI</text>
            </g>
        </svg>
        <!-- SVG Logo End -->
